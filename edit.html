<script>
    function getContacts() {
        return JSON.parse(localStorage.getItem("contacts") || "[]");
    }

    function getIndex() {
        let params = new URLSearchParams(window.location.search);
        let i = parseInt(params.get("index"), 10);
        return Number.isInteger(i) ? i : -1;
    }

    let editIndex = getIndex();
    let photoDataUrl = "";

    function setPhotoPreview(src) {
        let preview = document.getElementById("photoPreview");
        let placeholder = document.getElementById("photoPlaceholder");
        if (src) {
            preview.src = src;
            preview.classList.remove("hidden");
            placeholder.classList.add("hidden");
        } else {
            preview.src = "";
            preview.classList.add("hidden");
            placeholder.classList.remove("hidden");
        }
    }

    function removePhoto() {
        photoDataUrl = "";
        setPhotoPreview("");
    }

    document.getElementById("photoInput").addEventListener("change", function (e) {
        let file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) { alert("Please choose an image file."); return; }
        if (file.size > 2 * 1024 * 1024) { alert("Image is too large. Please choose one under 2MB."); return; }
        let reader = new FileReader();
        reader.onload = function (ev) {
            photoDataUrl = ev.target.result;
            setPhotoPreview(photoDataUrl);
        };
        reader.readAsDataURL(file);
    });

    function loadContact() {
        let contacts = getContacts();
        if (editIndex < 0 || editIndex >= contacts.length) {
            alert("Contact not found.");
            window.location.href = "dashboard.html";
            return;
        }
        let c = contacts[editIndex];
        let parts = (c.name || "").trim().split(/\s+/);
        document.getElementById("firstName").value = parts.shift() || "";
        document.getElementById("lastName").value = parts.join(" ");
        document.getElementById("email").value = c.email || "";
        document.getElementById("phone").value = c.phone || "";
        document.getElementById("company").value = c.company || "";
        photoDataUrl = c.photo || "";
        setPhotoPreview(photoDataUrl);
    }

    function updateContact() {
        let contacts = getContacts();
        if (editIndex < 0 || editIndex >= contacts.length) {
            alert("Contact not found.");
            return;
        }
        let firstName = document.getElementById("firstName").value.trim();
        let lastName = document.getElementById("lastName").value.trim();
        if (!firstName && !lastName) { alert("Please enter a name."); return; }

        let existing = contacts[editIndex];
        contacts[editIndex] = {
            ...existing,
            name: (firstName + " " + lastName).trim(),
            company: document.getElementById("company").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            photo: photoDataUrl
        };
        try {
            localStorage.setItem("contacts", JSON.stringify(contacts));
        } catch (err) {
            alert("Could not save: storage is full (images take up space).");
            return;
        }
        alert("Contact updated!");
        window.location.href = "dashboard.html";
    }

    loadContact();
</script>
