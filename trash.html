                    </button>

<script>
    const TRASH_DAYS = 30;
    const DAY_MS = 24 * 60 * 60 * 1000;

    function getTrash() {
        return JSON.parse(localStorage.getItem("trash") || "[]");
    }
    function setTrash(trash) {
        localStorage.setItem("trash", JSON.stringify(trash));
    }
    function getContacts() {
        return JSON.parse(localStorage.getItem("contacts") || "[]");
    }

    function escapeHtml(str) {
        return String(str || "").replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
    }

    function avatar(contact) {
        if (contact.photo) {
            return `<img src="${escapeHtml(contact.photo)}" alt="${escapeHtml(contact.name)}" class="w-full h-full object-cover grayscale opacity-80">`;
        }
        let initials = (contact.name || "?").trim().split(/\s+/).map(p => p[0]).slice(0, 2).join("").toUpperCase();
        return `<div class="w-full h-full flex items-center justify-center bg-secondary-container text-on-secondary-container text-headline-sm font-headline-sm">${escapeHtml(initials)}</div>`;
    }

    // Remove items past the 30-day expiry whenever the page loads.
    function purgeExpired() {
        let now = Date.now();
        let trash = getTrash();
        let kept = trash.filter(c => (now - (c.deletedAt || now)) < TRASH_DAYS * DAY_MS);
        if (kept.length !== trash.length) setTrash(kept);
    }

    function displayTrash() {
        let trash = getTrash();
        let trashList = document.getElementById("trashList");
        let emptyState = document.getElementById("emptyState");
        let emptyTrashBtn = document.getElementById("emptyTrashBtn");

        if (!trash.length) {
            trashList.classList.add("hidden");
            emptyState.classList.remove("hidden");
            emptyState.classList.add("flex");
            emptyTrashBtn.classList.add("hidden");
            return;
        }

        trashList.classList.remove("hidden");
        emptyState.classList.add("hidden");
        emptyState.classList.remove("flex");
        emptyTrashBtn.classList.remove("hidden");
        trashList.innerHTML = "";

        trash.forEach((contact, index) => {
            let daysElapsed = Math.floor((Date.now() - (contact.deletedAt || Date.now())) / DAY_MS);
            let daysLeft = Math.max(0, TRASH_DAYS - daysElapsed);
            let urgent = daysLeft <= 3;

            let card = document.createElement("div");
            card.className = "bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm hover:shadow-md transition-shadow flex flex-col relative group";
            card.innerHTML = `
                <div class="flex items-start gap-md">
                    <div class="w-12 h-12 rounded-full overflow-hidden bg-surface-container shrink-0 border border-outline-variant">
                        ${avatar(contact)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-headline-sm font-headline-sm text-on-background line-through opacity-80">${escapeHtml(contact.name) || "Unnamed"}</h3>
                        ${contact.company ? `<p class="text-body-md font-body-md text-on-surface-variant">${escapeHtml(contact.company)}</p>` : ""}
                        ${contact.email ? `<p class="text-body-md font-body-md text-on-surface-variant mt-1 text-sm truncate"><span class="material-symbols-outlined text-xs align-middle">mail</span> ${escapeHtml(contact.email)}</p>` : ""}
                        ${contact.phone ? `<p class="text-body-md font-body-md text-on-surface-variant mt-1 text-sm"><span class="material-symbols-outlined text-xs align-middle">call</span> ${escapeHtml(contact.phone)}</p>` : ""}
                    </div>
                </div>
                <div class="mt-lg pt-md border-t border-surface-container flex justify-between items-center opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="text-label-md font-label-md ${urgent ? "text-error" : "text-on-surface-variant"} flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">${urgent ? "warning" : "schedule"}</span> ${daysLeft} days left
                    </span>
                    <div class="flex gap-sm">
                        <button onclick="restoreContact(${index})" class="text-body-md font-body-md font-semibold text-primary px-3 py-1.5 hover:bg-primary-container/20 rounded-lg transition-colors">Restore</button>
                        <button onclick="deletePermanently(${index})" class="text-body-md font-body-md font-semibold text-error px-3 py-1.5 hover:bg-error-container/50 rounded-lg transition-colors">Delete</button>
                    </div>
                </div>
            `;
            trashList.appendChild(card);
            document.getElementById("trashCount").textContent = (trash.length);
        });
    }

    function restoreContact(index) {
        let trash = getTrash();
        let restored = trash.splice(index, 1)[0];
        if (!restored) return;
        delete restored.deletedAt;
        let contacts = getContacts();
        contacts.push(restored);
        localStorage.setItem("contacts", JSON.stringify(contacts));
        setTrash(trash);
        displayTrash();
    }

    function deletePermanently(index) {
        if (!confirm("Permanently delete this contact? This cannot be undone.")) return;
        let trash = getTrash();
        trash.splice(index, 1);
        setTrash(trash);
        displayTrash();
    }

    function emptyTrash() {
        if (!getTrash().length) return;
        if (!confirm("Permanently delete all contacts in the trash? This cannot be undone.")) return;
        setTrash([]);
        displayTrash();
    }

    purgeExpired();
    displayTrash();
</script>
