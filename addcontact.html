<body class="bg-background text-on-background font-body-md min-h-screen flex">
    <!-- SideNavBar -->
    <nav
        class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-surface-container-low border-r border-outline-variant p-md gap-base shadow-none z-20">
        <div class="mb-lg px-md">
            <h1 class="text-headline-md font-headline-md text-primary font-bold">ProNetwork</h1>
            <p class="text-label-md font-label-md text-on-surface-variant mt-1">Professional CRM</p>
        </div>
        <div class="flex flex-col gap-sm flex-1">
            <a class="flex items-center gap-md text-on-surface-variant px-md py-sm hover:bg-surface-container-high rounded-xl transition-all"
                href="dashboard.html">
                <span class="material-symbols-outlined" data-icon="person">person</span>
                <span class="text-label-md font-label-md">Contacts</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant px-md py-sm hover:bg-surface-container-high rounded-xl transition-all"
                href="favorites.html">
                <span class="material-symbols-outlined" data-icon="star">star</span>
                <span class="text-label-md font-label-md">Favorites</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant px-md py-sm hover:bg-surface-container-high rounded-xl transition-all"
                href="trash.html">
                <span class="material-symbols-outlined" data-icon="delete">delete</span>
                <span class="text-label-md font-label-md">Trash</span>
            </a>
        </div>
    </nav>
    <!-- Main Content Area -->
    <div class="flex-1 md:ml-64 flex flex-col min-h-screen relative overflow-hidden">
        <!-- TopNavBar -->
        <header
            class="w-full h-16 bg-surface shadow-sm z-10 sticky top-0 md:hidden flex justify-between items-center px-md border-b border-outline-variant">
            <div class="flex items-center gap-sm">
                <h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">ProNetwork</h1>
            </div>
            <div class="flex items-center gap-sm">
                <button
                    class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">
                    <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                </button>
                <button
                    class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">
                    <span class="material-symbols-outlined" data-icon="help">help</span>
                </button>
            </div>
        </header>
        <!-- Canvas -->
        <main class="flex-1 p-md md:p-xl flex justify-center items-start overflow-y-auto">
            <div
                class="w-full max-w-3xl bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg md:p-xl mt-md md:mt-lg relative">
                <div class="mb-lg border-b border-outline-variant pb-md flex items-center justify-between">
                    <h2 class="text-headline-md font-headline-md text-on-background">Add New Contact</h2>
                    <a href="dashboard.html"
                        class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors"
                        data-icon="close">close</a>
                </div>
                <form class="space-y-lg">
                    <!-- Profile Image Upload -->
                    <label for="photoInput"
                        class="flex flex-col md:flex-row items-center gap-lg border border-outline-variant border-dashed rounded-xl p-lg bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
                        <div
                            class="w-24 h-24 rounded-full bg-surface-container-high border border-outline-variant flex items-center justify-center overflow-hidden flex-shrink-0 group-hover:border-primary transition-colors">
                            <span id="photoPlaceholder"
                                class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors"
                                data-icon="add_a_photo">add_a_photo</span>
                            <img id="photoPreview" class="w-full h-full object-cover hidden" alt="Profile preview" />
                        </div>
                        <div class="text-center md:text-left">
                            <p class="text-body-lg font-body-lg text-on-background font-semibold">Upload Profile Picture
                            </p>
                            <p class="text-body-md font-body-md text-on-surface-variant mt-1">Recommended size:
                                400x400px. JPG or PNG.</p>
                        </div>
                        <input id="photoInput" type="file" accept="image/*" class="hidden" />
                    </label>
                    <!-- Personal Details -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                        <div class="space-y-sm">
                            <label class="block text-label-md font-label-md text-on-surface-variant">First Name</label>
                            <input id="firstName"
                                class="w-full h-10 px-md border border-outline-variant rounded bg-surface-container-lowest text-body-md font-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none"
                                placeholder="Jane" type="text" />
                        </div>
                        <div class="space-y-sm">
                            <label class="block text-label-md font-label-md text-on-surface-variant">Last Name</label>
                            <input id="lastName"
                                class="w-full h-10 px-md border border-outline-variant rounded bg-surface-container-lowest text-body-md font-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none"
                                placeholder="Doe" type="text" />
                        </div>
                    </div>
                    <!-- Contact Details -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                        <div class="space-y-sm">
                            <label class="block text-label-md font-label-md text-on-surface-variant">Email
                                Address</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                                    data-icon="mail">mail</span>
                                <input id="email"
                                    class="w-full h-10 pl-10 pr-md border border-outline-variant rounded bg-surface-container-lowest text-body-md font-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none"
                                    placeholder="jane.doe@example.com" type="email" />
                            </div>
                        </div>
                        <div class="space-y-sm">
                            <label class="block text-label-md font-label-md text-on-surface-variant">Phone
                                Number</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                                    data-icon="phone">phone</span>
                                <input id="phone"
                                    class="w-full h-10 pl-10 pr-md border border-outline-variant rounded bg-surface-container-lowest text-body-md font-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none"
                                    placeholder="+1 (555) 000-0000" type="tel" />
                            </div>
                        </div>
                    </div>
                    <!-- Company / Label -->
                    <div class="space-y-sm">
                        <label class="block text-label-md font-label-md text-on-surface-variant">Company /
                            Organization</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                                data-icon="domain">domain</span>
                            <input id="company"
                                class="w-full h-10 pl-10 pr-md border border-outline-variant rounded bg-surface-container-lowest text-body-md font-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none"
                                placeholder="Acme Corp" type="text" />
                        </div>
                    </div>
                    <div class="space-y-sm">
                        <label class="block text-label-md font-label-md text-on-surface-variant">Tags / Labels</label>
                        <div class="flex flex-wrap gap-sm">
                            <span
                                class="px-3 py-1 bg-[#F1F5F9] text-secondary rounded-full text-label-md font-label-md border border-outline-variant/30 flex items-center gap-1 cursor-pointer hover:bg-surface-container transition-colors">Work
                                <span class="material-symbols-outlined text-[14px]"
                                    data-icon="close">close</span></span>
                            <span
                                class="px-3 py-1 border border-dashed border-outline-variant text-on-surface-variant rounded-full text-label-md font-label-md flex items-center gap-1 cursor-pointer hover:border-primary hover:text-primary transition-colors"><span
                                    class="material-symbols-outlined text-[16px]" data-icon="add">add</span> Add
                                Tag</span>
                        </div>
                    </div>
                    <!-- Actions -->
                    <div class="pt-lg border-t border-outline-variant flex justify-end gap-md">
                        <button onclick="window.location.href='dashboard.html'"
                            class="px-lg py-2 bg-surface-container-lowest border border-outline-variant text-on-background rounded font-label-md text-label-md hover:bg-surface-container-low transition-colors shadow-sm"
                            type="button">
                            Cancel
                        </button>
                        <button id="saveContactBtn" onclick="saveContact()" class="px-lg py-2 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-surface-tint transition-colors shadow-sm flex items-center gap-sm" type="button">
                            <span class="material-symbols-outlined text-[18px]" data-icon="save">save</span>
                            Save Contact
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
<script>
    let photoDataUrl = "";

    document.getElementById("photoInput").addEventListener("change", function (e) {
        let file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith("image/")) {
            alert("Please choose an image file.");
            return;
        }
        // localStorage caps at ~5MB total, so reject large images.
        if (file.size > 7 * 1024 * 1024) {
            alert("Image is too large. Please choose one under 7MB.");
            return;
        }

        let reader = new FileReader();
        reader.onload = function (event) {
            photoDataUrl = event.target.result;
            let preview = document.getElementById("photoPreview");
            preview.src = photoDataUrl;
            preview.classList.remove("hidden");
            document.getElementById("photoPlaceholder").classList.add("hidden");
        };
        reader.readAsDataURL(file);
    });

    function getContacts() {
        let stored = localStorage.getItem("contacts");
        return stored ? JSON.parse(stored) : [];
    }

    function saveContact() {
        let firstName = document.getElementById("firstName").value.trim();
        let lastName = document.getElementById("lastName").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let company = document.getElementById("company").value.trim();

        if (!firstName && !lastName) {
            alert("Please enter a name.");
            return;
        }

        let contactObj = {
            name: (firstName + " " + lastName).trim(),
            company: company,
            email: email,
            phone: phone,
            photo: photoDataUrl
        };

        let contacts = getContacts();
        contacts.push(contactObj);
        try {
            localStorage.setItem("contacts", JSON.stringify(contacts));
        } catch (err) {
            alert("Could not save: storage is full (images take up space).");
            return;
        }
        console.log("Saved contacts:", contacts);

        alert("Contact saved!");
        window.location.href = "dashboard.html";
    }
</script>
