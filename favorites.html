    <script>
        function getContacts() {
            let stored = localStorage.getItem("contacts");
            return stored ? JSON.parse(stored) : [];
        }

        function escapeHtml(str) {
            return String(str || "").replace(/[&<>"']/g, function (c) {
                return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
            });
        }

        function avatar(contact) {
            if (contact.photo) {
                return `<img src="${escapeHtml(contact.photo)}" alt="${escapeHtml(contact.name)}" class="w-16 h-16 rounded-full object-cover">`;
            }
            let initials = (contact.name || "?").trim().split(/\s+/).map(p => p[0]).slice(0, 2).join("").toUpperCase();
            return `<div class="w-16 h-16 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-headline-sm text-headline-sm">${escapeHtml(initials)}</div>`;
        }

        function displayFavorites() {
            let contacts = getContacts();
            // keep each favorite's real index so actions map to the right contact
            let favorites = contacts
                .map((contact, index) => ({ contact, index }))
                .filter(item => item.contact.favorite);

            let contactList = document.getElementById("contactList");
            let emptyState = document.getElementById("emptyState");

            if (!favorites.length) {
                contactList.classList.add("hidden");
                emptyState.classList.remove("hidden");
                emptyState.classList.add("flex");
                return;
            }

            contactList.classList.remove("hidden");
            emptyState.classList.add("hidden");
            emptyState.classList.remove("flex");
            contactList.innerHTML = "";

            favorites.forEach(({ contact, index }) => {
                let card = document.createElement("div");
                card.className = "contact-row bg-surface-container-lowest rounded-xl border border-surface-container-high shadow-sm p-lg flex flex-col gap-md relative transition-shadow hover:shadow-md cursor-default";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        ${avatar(contact)}
                        <div class="contact-row-actions flex gap-sm">
                            <button onclick="toggleFavorite(${index})" class="p-xs text-primary hover:bg-surface-container-high rounded-full transition-colors" title="Remove from favorites">
                                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">star</span>
                            </button>
                            <button onclick="editContact(${index})" class="p-xs text-on-surface-variant hover:text-primary hover:bg-surface-container-high rounded-full transition-colors" title="Edit">
                                <span class="material-symbols-outlined text-[20px]">edit</span>
                            </button>
                            <button onclick="deleteContact(${index})" class="p-xs text-on-surface-variant hover:text-error hover:bg-error-container rounded-full transition-colors" title="Delete">
                                <span class="material-symbols-outlined text-[20px]">delete</span>
                            </button>
                        </div>
                    </div>
                    <div>
                        <p class="font-headline-sm text-headline-sm text-on-surface">${escapeHtml(contact.name) || "Unnamed"}</p>
                        ${contact.company ? `<div class="flex gap-xs mt-xs">
                            <span class="px-sm py-[2px] bg-[#F1F5F9] text-secondary rounded-full font-label-md text-[10px]">${escapeHtml(contact.company)}</span>
                        </div>` : ""}
                    </div>
                    <div class="flex flex-col gap-sm pt-md border-t border-surface-container-low mt-auto">
                        ${contact.phone ? `<div class="font-body-md text-on-surface-variant flex items-center gap-sm">
                            <span class="material-symbols-outlined text-[16px]">phone</span> ${escapeHtml(contact.phone)}
                        </div>` : ""}
                        ${contact.email ? `<div class="font-body-md text-on-surface-variant flex items-center gap-sm truncate">
                            <span class="material-symbols-outlined text-[16px]">mail</span> ${escapeHtml(contact.email)}
                        </div>` : ""}
                    </div>
                `;
                contactList.appendChild(card);
            });
        }

        function toggleFavorite(index) {
            let contacts = getContacts();
            contacts[index].favorite = !contacts[index].favorite;
            localStorage.setItem("contacts", JSON.stringify(contacts));
            displayFavorites();
        }

        function editContact(index) {
            window.location.href = "edit.html?index=" + index;
        }

        function deleteContact(index) {
            if (!confirm("Move this contact to trash?")) return;
            let contacts = getContacts();
            let removed = contacts.splice(index, 1)[0];
            removed.deletedAt = Date.now();
            let trash = JSON.parse(localStorage.getItem("trash") || "[]");
            trash.push(removed);
            localStorage.setItem("trash", JSON.stringify(trash));
            localStorage.setItem("contacts", JSON.stringify(contacts));
            displayFavorites();
        }

        displayFavorites();
    </script>
